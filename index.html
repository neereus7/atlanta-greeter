                MessageCircle: <Fragment><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></Fragment>,
                Sparkles: <Fragment><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" /></Fragment>,
                Search: <Fragment><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Fragment>,
                Book: <Fragment><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></Fragment>,
                BookOpen: <Fragment><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Fragment>,
                Menu: <Fragment><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></Fragment>,
                X: <Fragment><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Fragment>,
                Clock: <Fragment><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Fragment>,
                Languages: <Fragment><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></Fragment>,
                ChevronRight: <Fragment><polyline points="9 18 15 12 9 6"/></Fragment>,
                HeartHandshake: <Fragment><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M12 5 9.04 7.96a2.17 2.17 0 0 0 0 3.08v0c.82.82 2.13.85 3 .07l2.07-1.9a2.82 2.82 0 0 1 3.79 0l2.96 2.66"/><path d="m18 15-2-2"/><path d="m15 18-2-2"/></Fragment>,
                ChevronDown: <Fragment><polyline points="6 9 12 15 18 9"/></Fragment>,
                Library: <Fragment><path d="m16 6 4 14"/><path d="M12 6v14"/><path d="M8 8v12"/><path d="M4 4v16"/></Fragment>,
                AlertTriangle: <Fragment><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></Fragment>,
                ClipboardList: <Fragment><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></Fragment>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        // =========================================================
        // 3. ACCORDION COMPONENT
        // =========================================================
        const Accordion = ({ title, iconName, children }) => {
          const [isOpen, setIsOpen] = useState(false);
          return (
            <div className="bg-white rounded-2xl border border-[#F3E1E4] shadow-sm overflow-hidden mb-4 transition-all">
              <button onClick={() => setIsOpen(!isOpen)} className="w-full flex items-center justify-between p-5 bg-white hover:bg-[#FDF8F9] transition-colors">
                <div className="flex items-center space-x-3">
                  <div className="text-[#711E30]"><Icon name={iconName} size={18} /></div>
                  <span className="font-bold text-[#4A0E1A] text-left">{title}</span>
                </div>
                <div className={`transform transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`}>
                  <Icon name="ChevronDown" size={20} className="text-[#C5A059]" />
                </div>
              </button>
              <div className={`transition-all duration-300 ease-in-out ${isOpen ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'} overflow-hidden bg-[#FAFAFA]`}>
                <div className="p-6 border-t border-[#F3E1E4]">
                  {children}
                </div>
              </div>
            </div>
          );
        };

        // =========================================================
        // 4. MAIN APP COMPONENT
        // =========================================================
        const App = () => {
          const [lang, setLang] = useState('en');
          const [activeTab, setActiveTab] = useState('home');
          const [searchQuery, setSearchQuery] = useState('');
          const [isMenuOpen, setIsMenuOpen] = useState(false);

          const t = content[lang];

          const sections = [
            { id: 'home', label: t.nav.home, icon: <Icon name="Info" size={20} /> },
            { id: 'script', label: t.nav.script, icon: <Icon name="MessageCircle" size={20} /> },
            { id: 'locations', label: t.nav.locations, icon: <Icon name="MapPin" size={20} /> },
            { id: 'rules', label: t.nav.rules, icon: <Icon name="CheckCircle2" size={20} /> },
            { id: 'faq', label: t.nav.faq, icon: <Icon name="Search" size={20} /> },
            { id: 'library', label: t.nav.library, icon: <Icon name="Library" size={20} /> },
          ];

          const filteredFaqs = t.faq.qas.filter(f => 
            f.q.toLowerCase().includes(searchQuery.toLowerCase()) || 
            f.a.toLowerCase().includes(searchQuery.toLowerCase())
          );

          const NavItem = ({ id, label, icon }) => (
            <button
              onClick={() => { setActiveTab(id); setIsMenuOpen(false); }}
              className={`flex items-center space-x-4 w-full p-4 rounded-xl transition-all ${
                activeTab === id ? 'bg-[#711E30] text-[#C5A059] shadow-lg shadow-[#711E30]/20' : 'text-slate-600 hover:bg-slate-100 hover:text-[#711E30]'
              }`}
            >
              {icon}
              <span className="font-bold text-sm tracking-wide">{label}</span>
            </button>
          );

          return (
            <div className="min-h-screen bg-[#FAFAFA] font-sans text-slate-900 overflow-x-hidden">
              
              {/* Top Navbar */}
              <nav className="bg-[#711E30] text-white px-6 py-5 sticky top-0 z-50 shadow-md flex justify-between items-center border-b border-[#4A0E1A]">
                <div className="flex items-center space-x-3">
                  <div className="w-10 h-10 bg-[#C5A059]/10 rounded-xl flex items-center justify-center border border-[#C5A059]/30">
                    <Icon name="Book" size={20} className="text-[#C5A059]" />
                  </div>
                  <div>
                    <h1 className="text-base font-black tracking-tight leading-none text-[#F9F9FA]">{t.header.title}</h1>
                    <p className="text-[9px] text-[#C5A059] font-bold uppercase tracking-[0.25em] mt-1">{t.header.subtitle}</p>
                  </div>
                </div>
                
                <div className="flex items-center space-x-3">
                  <button onClick={() => setLang(lang === 'en' ? 'gu' : 'en')} className="flex items-center space-x-1.5 bg-[#4A0E1A]/50 hover:bg-[#4A0E1A] border border-[#C5A059]/30 px-3 py-1.5 rounded-lg transition-all">
                    <Icon name="Languages" size={14} className="text-[#C5A059]" />
                    <span className="text-[11px] font-bold tracking-widest text-[#F9F9FA]">{lang === 'en' ? 'ગુજરાતી' : 'EN'}</span>
                  </button>

                  <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="p-2 bg-[#4A0E1A]/50 hover:bg-[#4A0E1A] rounded-lg border border-[#C5A059]/30 transition-all text-[#C5A059]">
                    {isMenuOpen ? <Icon name="X" size={20} /> : <Icon name="Menu" size={20} />}
                  </button>
                </div>
              </nav>

              {/* Sidebar Overlay */}
              {isMenuOpen && <div className="fixed inset-0 bg-[#4A0E1A]/40 z-40 backdrop-blur-sm transition-opacity" onClick={() => setIsMenuOpen(false)} />}

              {/* Sidebar Menu */}
              <div className={`fixed top-0 right-0 h-full bg-white w-72 z-50 shadow-2xl border-l border-slate-100 transform transition-transform duration-300 ease-out ${isMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                <div className="p-6 pt-24 space-y-2">
                  <h2 className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-6 px-4">Menu</h2>
                  {sections.map(s => <NavItem key={s.id} {...s} />)}
                </div>
                <div className="absolute bottom-8 left-6 right-6 p-5 bg-[#FAF5ED] rounded-2xl border border-[#E8DCC4]">
                  <p className="text-[10px] text-[#711E30] font-black uppercase tracking-widest mb-3">Support</p>
                  <a href="mailto:info.atlanta@usa.baps.org" className="flex items-center justify-between text-[#711E30] hover:text-[#4A0E1A] bg-white p-3 rounded-xl shadow-sm border border-slate-100">
                    <span className="text-xs font-bold">Email Help Desk</span>
                    <Icon name="ChevronRight" size={16} />
                  </a>
                </div>
              </div>

              {/* Main Content Area */}
              <main className="max-w-md mx-auto p-5 pb-32">
                
                {/* HOME DASHBOARD */}
                {activeTab === 'home' && (
                  <div className="space-y-6">
                    <div className="pt-2 pl-2">
                      <h2 className="text-3xl font-black text-[#4A0E1A] tracking-tight">{t.header.greeting}</h2>
                    </div>

                    <div className="bg-[#4A0E1A] text-white rounded-2xl shadow-xl shadow-[#711E30]/20 relative overflow-hidden border border-[#8A2236] min-h-[240px] flex flex-col justify-end p-8">
                      <div className="absolute inset-0 overflow-hidden bg-[#4A0E1A]">
                        <img 
                          src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/BAPS_Shri_Swaminarayan_Mandir_Atlanta.jpg/800px-BAPS_Shri_Swaminarayan_Mandir_Atlanta.jpg" 
                          alt=""
                          className="w-full h-full object-cover object-[center_30%] opacity-40 transition-transform duration-1000 hover:scale-105"
                          onError={(e) => { e.target.style.display = 'none'; }}
                        />
                      </div>
                      <div className="absolute inset-0 bg-gradient-to-t from-[#4A0E1A] via-[#4A0E1A]/70 to-[#4A0E1A]/10" />
                      
                      <div className="relative z-10 space-y-4">
                        <p className="text-[10px] text-[#C5A059] font-black uppercase tracking-[0.3em] opacity-100 drop-shadow-md">|| Swami Shreeji ||</p>
                        <p className="text-xl font-bold text-[#FAF5ED] border-l-2 border-[#C5A059] pl-5 leading-snug drop-shadow-lg">{t.home.quote}</p>
                        <p className="text-sm font-medium text-white/95 leading-relaxed drop-shadow-md">{t.home.purpose}</p>
                      </div>
                    </div>

                    <div className="space-y-3">
                      <h3 className="text-[10px] font-black text-[#8A2236] uppercase tracking-widest pl-2">{t.home.quickActions}</h3>
                      <div className="grid grid-cols-2 gap-3">
                        {[
                          { id: 'script', icon: <Icon name="MessageCircle" size={22} />, label: sections[1].label },
                          { id: 'locations', icon: <Icon name="MapPin" size={22} />, label: sections[2].label },
                          { id: 'faq', icon: <Icon name="Search" size={22} />, label: sections[4].label },
                          { id: 'library', icon: <Icon name="Library" size={22} />, label: sections[5].label }
                        ].map((action, i) => (
                          <button key={i} onClick={() => setActiveTab(action.id)} className="bg-white p-5 rounded-2xl shadow-sm border border-[#F3E1E4] flex flex-col items-center justify-center space-y-3 hover:border-[#C5A059]/50 transition-all active:scale-95 group">
                            <div className="bg-[#FDF8F9] text-[#711E30] p-3 rounded-xl group-hover:bg-[#711E30] group-hover:text-[#C5A059] transition-colors">{action.icon}</div>
                            <span className="font-bold text-sm text-[#4A0E1A]">{action.label}</span>
                          </button>
                        ))}
                      </div>
                    </div>

                    <div className="space-y-3">
                      <h3 className="text-[10px] font-black text-[#8A2236] uppercase tracking-widest pl-2 flex items-center space-x-1.5"><Icon name="Clock" size={12}/> <span>{t.home.dailySchedule}</span></h3>
                      <div className="bg-white rounded-2xl shadow-sm border border-[#F3E1E4] overflow-hidden">
                        <div className="p-5 flex justify-between items-center border-b border-slate-50">
                          <span className="font-bold text-[#4A0E1A]">{t.home.rajbhog}</span>
                          <span className="bg-[#FAF5ED] text-[#711E30] border border-[#E8DCC4] text-xs font-bold px-3 py-1.5 rounded-lg tracking-wide">11:15 AM</span>
                        </div>
                        <div className="p-5 flex justify-between items-center border-b border-slate-50">
                          <span className="font-bold text-[#4A0E1A]">{t.home.sandhya}</span>
                          <span className="bg-[#FAF5ED] text-[#711E30] border border-[#E8DCC4] text-xs font-bold px-3 py-1.5 rounded-lg tracking-wide">7:00 PM</span>
                        </div>
                        <div className="p-5 flex justify-between items-center bg-[#FAFAFA]">
                          <span className="font-bold text-slate-500">{t.home.cafe}</span>
                          <span className="text-slate-400 text-xs font-bold">11:00 AM - 8:00 PM</span>
                        </div>
                      </div>
                    </div>

                    <div className="bg-[#FDF8F9] p-6 rounded-2xl border border-[#F3E1E4] flex items-start space-x-4">
                      <div className="bg-[#711E30]/10 p-3 rounded-xl shrink-0"><Icon name="HeartHandshake" size={20} className="text-[#711E30]" /></div>
                      <div>
                        <h4 className="font-black text-[#4A0E1A] mb-1.5">{t.home.unityTitle}</h4>
                        <p className="text-xs font-medium text-[#711E30] leading-relaxed opacity-90">{t.home.unityDesc}</p>
                      </div>
                    </div>
                  </div>
                )}

                {/* SCRIPT SECTION */}
                {activeTab === 'script' && (
                  <div className="space-y-6">
                    <h2 className="text-3xl font-black text-[#4A0E1A] tracking-tight pl-2">{t.nav.script}</h2>
                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-[#F3E1E4]">
                      <div className="flex items-center space-x-3 mb-5">
                        <div className="p-2.5 bg-[#FAF5ED] rounded-lg border border-[#E8DCC4]"><Icon name="MessageCircle" className="text-[#711E30]" size={18}/></div>
                        <h3 className="text-sm font-black text-[#4A0E1A] uppercase tracking-widest">{t.script.introTitle}</h3>
                      </div>
                      <p className="text-lg text-slate-700 leading-relaxed font-bold border-l-2 border-[#C5A059] pl-5">{t.script.introText}</p>
                    </div>
                    <div className="space-y-4">
                      <h3 className="font-black text-[#8A2236] uppercase tracking-widest text-[10px] px-2">{t.script.workflow}</h3>
                      {t.script.steps.map((step, i) => (
                        <div key={i} className="bg-white p-6 rounded-2xl border border-[#F3E1E4] shadow-sm space-y-1.5">
                          <div className="font-bold text-[#4A0E1A] text-base">{step.t}</div>
                          <div className="text-slate-600 text-sm font-medium leading-snug">{step.d}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* LOCATIONS SECTION */}
                {activeTab === 'locations' && (
                  <div className="space-y-5">
                    <h2 className="text-3xl font-black text-[#4A0E1A] tracking-tight pl-2">{t.locations.title}</h2>
                    {t.locations.places.map((post, i) => (
                      <div key={i} className="bg-white p-7 rounded-2xl border border-[#F3E1E4] shadow-sm space-y-4 relative overflow-hidden group hover:border-[#C5A059]/50 transition-all">
                        <div className="flex justify-between items-start">
                          <h3 className="font-bold text-[#4A0E1A] text-lg pr-8">{post.p}</h3>
                          <div className="p-2.5 bg-[#FAF5ED] rounded-xl border border-[#E8DCC4] absolute top-6 right-6"><Icon name="MapPin" size={18} className="text-[#711E30]" /></div>
                        </div>
                        <p className="text-slate-600 text-sm font-medium leading-relaxed">{post.d}</p>
                        <div className="bg-[#FDF8F9] p-4 rounded-xl border border-[#F3E1E4]">
                          <span className="text-[9px] font-black uppercase tracking-widest text-[#8A2236] mb-1.5 block">Pro Tip</span>
                          <span className="text-sm font-medium text-[#4A0E1A]">{post.tip}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {/* RULES SECTION */}
                {activeTab === 'rules' && (
                  <div className="space-y-6">
                    <h2 className="text-3xl font-black text-[#4A0E1A] tracking-tight pl-2">{t.rules.title}</h2>
                    <div className="bg-emerald-50/50 border border-emerald-100 p-8 rounded-2xl space-y-5 shadow-sm">
                      <h3 className="flex items-center space-x-2 text-emerald-800 font-bold text-sm">
                        <Icon name="CheckCircle2" size={18} /> <span>{t.rules.dos}</span>
                      </h3>
                      <ul className="space-y-4">
                        {t.rules.doList.map((li, i) => (
                          <li key={i} className="flex items-start space-x-3 text-emerald-950 text-sm font-medium leading-snug">
                            <div className="mt-1.5 w-1.5 h-1.5 rounded-full bg-emerald-500 shrink-0" />
                            <span>{li}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                    <div className="bg-[#FDF8F9] border border-[#F3E1E4] p-8 rounded-2xl space-y-5 shadow-sm">
                      <h3 className="flex items-center space-x-2 text-[#711E30] font-bold text-sm">
                        <Icon name="XCircle" size={18} /> <span>{t.rules.donts}</span>
                      </h3>
                      <ul className="space-y-4">
                        {t.rules.dontList.map((li, i) => (
                          <li key={i} className="flex items-start space-x-3 text-[#4A0E1A] text-sm font-medium leading-snug">
                            <div className="mt-1.5 w-1.5 h-1.5 rounded-full bg-[#711E30] shrink-0" />
                            <span>{li}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  </div>
                )}

                {/* FAQ SECTION */}
                {activeTab === 'faq' && (
                  <div className="space-y-6">
                    <h2 className="text-3xl font-black text-[#4A0E1A] tracking-tight pl-2">{t.nav.faq}</h2>
                    <div className="sticky top-20 z-30 pt-2 pb-4 bg-[#FAFAFA]">
                      <div className="relative shadow-sm rounded-2xl">
                        <Icon name="Search" className="absolute left-5 top-1/2 -translate-y-1/2 text-[#C5A059]" size={20} />
                        <input 
                          type="text" placeholder={t.faq.search}
                          className="w-full bg-white p-5 pl-14 rounded-2xl border border-[#F3E1E4] focus:border-[#C5A059] outline-none font-bold text-sm text-[#4A0E1A] transition-all placeholder:font-medium placeholder:text-slate-400"
                          value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                        />
                      </div>
                    </div>
                    <div className="space-y-4">
                      {filteredFaqs.length > 0 ? filteredFaqs.map((f, i) => (
                        <div key={i} className="bg-white p-6 rounded-2xl border border-[#F3E1E4] shadow-sm transition-all hover:border-[#C5A059]/40 group">
                          <div className="font-bold text-[#4A0E1A] mb-3 text-[15px] leading-snug pr-2">{f.q}</div>
                          <div className="text-slate-600 text-sm font-medium leading-relaxed bg-[#FAFAFA] p-4 rounded-xl border border-slate-100">{f.a}</div>
                        </div>
                      )) : (
                        <div className="text-center py-16 text-[#8A2236] font-bold uppercase tracking-widest text-xs bg-white rounded-2xl border border-dashed border-[#F3E1E4]">{t.faq.noResults}</div>
                      )}
                    </div>
                  </div>
                )}

                {/* KNOWLEDGE LIBRARY SECTION */}
                {activeTab === 'library' && (
                  <div className="space-y-5">
                     <h2 className="text-3xl font-black text-[#4A0E1A] tracking-tight pl-2 mb-6">{t.library.title}</h2>
                     {t.library.categories.map((cat) => (
                       <Accordion key={cat.id} title={cat.title} iconName={cat.icon}>{cat.content}</Accordion>
                     ))}
                  </div>
                )}

              </main>

              {/* Bottom Floating Navigation */}
              <div className="fixed bottom-6 left-6 right-6 flex justify-around items-center bg-white/95 backdrop-blur-xl p-2 rounded-2xl shadow-2xl border border-[#F3E1E4] z-40 lg:hidden">
                {[sections[0], sections[1], sections[2], sections[3], sections[5]].map(s => (
                  <button 
                    key={s.id} onClick={() => setActiveTab(s.id)}
                    className={`flex flex-col items-center justify-center w-12 h-12 sm:w-14 sm:h-14 rounded-xl transition-all relative ${
                      activeTab === s.id ? 'bg-[#FDF8F9] text-[#711E30]' : 'text-slate-400 hover:text-[#C5A059]'
                    }`}
                  >
                    {s.icon}
                    {activeTab === s.id && <span className="absolute -bottom-1 w-1 h-1 rounded-full bg-[#C5A059]"></span>}
                  </button>
                ))}
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
